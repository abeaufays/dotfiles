set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g allow-passthrough on

set -g status-keys vi
set -g mode-keys vi
set -g base-index 1

set -g prefix C-b

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Styles
# Pane
set -g pane-border-style fg=colour0
set -g pane-active-border-style fg=colour0

set -g window-style 'fg=colour245'
set -g window-active-style 'fg=colour255'

set -g focus-events on

# Status bar
set -g status-justify left
set -g status-interval 1 

set -g status-position bottom
set -g status-style bg=black,fg=yellow

set -g status-left ' [#S] '
set -g status-left-length 100

set -g status-right ' %Y/%m/%d@%H:%M:%S '
set -g status-right-length 100

set -g window-status-current-style "fg=black,fg=darkorange"

bind f display-popup -T "Switch session:" -E "tmux list-sessions -F '#{session_name}'| grep -v \"^$(tmux display-message -p '#S')\" | fzf --reverse | xargs tmux switch -t"

bind S display-popup -h 3 -T "New session:" -E "bash -c 'read -e name && [ -n \"\$name\" ] && tmux new-session -d -s \"\$name\" && tmux switch -t \"\$name\"'"
bind W display-popup -h 3 -T "New window: (C-c to cancel)" -E "bash -c 'read -e name && [ -n \"\$name\" ] && tmux new-window -n \"\$name\" || tmux new-window '" 
bind a attach-session -c "#{pane_current_path}" \; display "Working directory set to #{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'

bind t display-popup -E -w 80% -h 80%

source-file -q ~/.config/tmux/local.tmux

run '~/.config/tmux/plugins/tpm/tpm'

